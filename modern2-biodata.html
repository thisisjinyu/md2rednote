<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2026 · 生物数据 / 量化自我</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#0a0c0f; color:#e8e4dc; font-family:"Noto Sans SC",system-ui,sans-serif; }
  .top { padding:24px 30px; border-bottom:1px solid rgba(255,255,255,.08); }
  .top h1 { margin:0 0 6px; font-size:19px; }
  .top p { margin:0; font-size:13px; color:#8a96a6; line-height:1.6; max-width:800px; }
  .top a { color:#c6f24e; }
  .deck { display:flex; flex-wrap:wrap; gap:36px; padding:36px 30px 60px; }
  .item { display:flex; flex-direction:column; gap:12px; }
  .frame { width:368px; height:490px; border-radius:14px; overflow:hidden; box-shadow:0 26px 60px rgba(0,0,0,.6); }
  .cap { font-size:12px; color:#8a96a6; }
  .card { width:1080px; height:1440px; transform:scale(.3407); transform-origin:top left; position:relative; overflow:hidden; font-family:"Sora","Noto Sans SC",system-ui,sans-serif; --bg:#0c1117; --tile:#161d27; --line:rgba(255,255,255,.09); --txt:#eef2f6; --dim:#8a96a6; --g:#46e08a; --c:#4cc9f0; --o:#ff8a4c; --lime:#c6f24e; background:var(--bg); color:var(--txt); }
  .bd-cover { padding:78px 70px; display:flex; flex-direction:column; height:100%; }
  .bd-cover .lbl { font-size:24px; letter-spacing:5px; color:var(--lime); font-weight:700; }
  .ringwrap { display:flex; justify-content:center; margin:30px 0 34px; }
  .ring { width:430px; height:430px; border-radius:50%; background:conic-gradient(var(--lime) 76%, #1d2530 0); position:relative; display:grid; place-items:center; }
  .ring::before { content:""; width:312px; height:312px; border-radius:50%; background:var(--bg); }
  .ring .pct { position:absolute; inset:0; display:grid; place-items:center; text-align:center; }
  .ring .pct b { font-size:128px; font-weight:800; line-height:1; letter-spacing:-3px; }
  .ring .pct span { font-size:26px; color:var(--dim); display:block; margin-top:6px; }
  .bd-cover h1 { font-family:"Noto Sans SC"; font-size:78px; font-weight:900; line-height:1.06; letter-spacing:-2px; margin:0; }
  .bd-cover .sub { font-size:30px; color:var(--dim); margin-top:14px; }
  .chips { display:flex; gap:16px; margin-top:auto; padding-top:40px; }
  .chip { flex:1; background:var(--tile); border:1px solid var(--line); border-radius:24px; padding:28px; }
  .chip .v { font-size:50px; font-weight:800; line-height:1; }
  .chip .v.g{color:var(--g)} .chip .v.c{color:var(--c)} .chip .v.o{color:var(--o)}
  .chip .k { font-size:23px; color:var(--dim); margin-top:10px; }
  .bd-body { padding:62px; display:grid; grid-template-columns:1fr 1fr; gap:24px; align-content:start; height:100%; }
  .bd-body h2 { grid-column:1/-1; font-family:"Noto Sans SC"; font-size:58px; font-weight:900; margin:0 0 4px; letter-spacing:-1px; }
  .tile { background:var(--tile); border:1px solid var(--line); border-radius:30px; padding:42px; }
  .tile.full { grid-column:1/-1; }
  .tile .tlabel { font-size:24px; color:var(--dim); font-weight:600; }
  .tile .big { font-size:104px; font-weight:800; line-height:1; margin-top:14px; letter-spacing:-3px; }
  .tile .big small { font-size:38px; color:var(--dim); font-weight:600; }
  .tile .g{color:var(--g)} .tile .lime{color:var(--lime)} .tile .c{color:var(--c)}
  .bars { display:flex; align-items:flex-end; gap:16px; height:210px; margin-top:26px; }
  .bars i { flex:1; background:linear-gradient(180deg,var(--lime),var(--g)); border-radius:10px 10px 4px 4px; display:block; }
  .bars i.dim { background:#26303c; }
  .legend { display:flex; justify-content:space-between; margin-top:14px; font-size:20px; color:var(--dim); }
</style>
</head>
<body>
  <div class="top">
    <h1>2026 · 生物数据 / 量化自我 Bio-Data</h1>
    <p>像 Oura/Whoop 那样把内容“仪表盘化”：完成度圆环、KPI 磁贴、柱状图、大号数据。一眼读懂，极具现代健康/营养/运动属性。 · <a href="modern2.html">← 返回 2026 总览</a></p>
  </div>
  <div class="deck">
    <div class="item">
      <div class="frame"><div class="card">
        <div class="bd-cover">
          <span class="lbl">MORNING REPORT · 晨间报告</span>
          <div class="ringwrap"><div class="ring"><div class="pct"><div><b>76%</b><span>仪式完成度</span></div></div></div></div>
          <h1>改变人生的<br />6 个晨间仪式</h1>
          <span class="sub">早起党的温柔自救指南</span>
          <div class="chips">
            <div class="chip"><div class="v g">28g</div><div class="k">蛋白质</div></div>
            <div class="chip"><div class="v c">1.6L</div><div class="k">饮水</div></div>
            <div class="chip"><div class="v o">7.2k</div><div class="k">步数</div></div>
          </div>
        </div>
      </div></div>
      <span class="cap">封面</span>
    </div>
    <div class="item">
      <div class="frame"><div class="card">
        <div class="bd-body">
          <h2>本周减糖进度</h2>
          <div class="tile"><div class="tlabel">糖摄入下降</div><div class="big lime">-42<small>%</small></div></div>
          <div class="tile"><div class="tlabel">连续达标</div><div class="big g">12<small>天</small></div></div>
          <div class="tile full"><div class="tlabel">每日含糖饮料 (杯)</div>
            <div class="bars"><i style="height:90%"></i><i style="height:72%"></i><i style="height:60%"></i><i style="height:44%"></i><i style="height:30%"></i><i style="height:18%"></i><i class="dim" style="height:10%"></i></div>
            <div class="legend"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
          </div>
        </div>
      </div></div>
      <span class="cap">正文</span>
    </div>
  </div>
</body>
</html>
