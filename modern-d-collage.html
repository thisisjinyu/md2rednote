<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#0f0f10; color:#e8e4dc; font-family:"Noto Sans SC",system-ui,sans-serif; }

  .deck { display:flex; flex-wrap:wrap; gap:36px; padding:36px 30px 60px; }

  .frame { width:368px; height:490px; border-radius:10px; overflow:hidden; box-shadow:0 26px 60px rgba(0,0,0,.5); }
  .cap { font-size:12px; color:#9a958c; }
  .card { width:1080px; height:1440px; transform:scale(.3407); transform-origin:top left; position:relative; overflow:hidden; font-family:"Noto Sans SC",system-ui,sans-serif; color:#15130f; }
  .card.cover { background:#efe9dd; }
  .cover .photo { position:absolute; top:96px; left:78px; width:600px; height:740px; border:9px solid #15130f; box-shadow:20px 20px 0 #15130f; transform:rotate(-3deg); overflow:hidden; }

  .cover .titlebox { position:absolute; right:54px; bottom:300px; background:#ffe14d; border:9px solid #15130f; padding:30px 38px; transform:rotate(2deg); box-shadow:16px 16px 0 #15130f; max-width:560px; }

  .cover .titlebox .u { text-decoration:underline; text-decoration-thickness:10px; text-underline-offset:8px; }
  .cover .sticker { position:absolute; top:120px; right:90px; font-family:"Ma Shan Zheng",cursive; font-size:70px; color:#ff3b30; transform:rotate(8deg); }
  .cover .eyebrow { position:absolute; left:90px; bottom:150px; background:#15130f; color:#fff; font-size:26px; font-weight:700; letter-spacing:3px; padding:12px 24px; transform:rotate(-2deg); }
  .cover .sub { position:absolute; right:64px; bottom:200px; font-size:34px; font-weight:600; transform:rotate(2deg); }
  .card.body { background:#efe9dd; padding:72px 70px; }
  .body .hwtitle { font-family:"Ma Shan Zheng",cursive; font-size:96px; color:#15130f; margin:0 0 8px; transform:rotate(-1deg); }
  .body .rule { height:9px; background:#15130f; width:300px; margin-bottom:50px; }
  .body .note { background:#fff; border:7px solid #15130f; box-shadow:14px 14px 0 #15130f; padding:40px 44px; margin-bottom:46px; transform:rotate(-1deg); }
  .body .note .n { font-size:30px; font-weight:900; background:#ff3b30; color:#fff; padding:4px 16px; display:inline-block; margin-bottom:16px; }
  .body .note p { font-size:40px; font-weight:600; line-height:1.4; margin:0; }
  .body .note.b2 { transform:rotate(1.5deg); background:#ffe14d; }
  .body .arrow { font-family:"Ma Shan Zheng",cursive; font-size:46px; color:#ff3b30; transform:rotate(-6deg); display:inline-block; margin:0 0 30px 40px; }

<body>
  <div class="top">
    <h1>方案 D · 杂志拼贴 / 微粗野 Brutalist Collage</h1>
    <p>硬黑边、硬阴影（偏移实色）、错位旋转、强对比撞色；手写体贴纸与箭头标注。个性、潮、还原小红书“随手拼贴”的原生感。 · <a href="modern.html">← 返回总览</a></p>

  <div class="deck">
    <div class="item">
      <div class="frame"><div class="card cover">

        <span class="sticker">本周必看!</span>
        <div class="titlebox"><h1>改变人生的<br /><span class="u">6个</span>晨间仪式</h1></div>

        <span class="sub">早起党的温柔自救</span>
      </div></div>
      <span class="cap">封面</span>
    </div>
    <div class="item">
      <div class="frame"><div class="card body">
        <h2 class="hwtitle">三个小改变</h2>
        <div class="rule"></div>
        <div class="note"><span class="n">01</span><p>含糖饮料换成气泡水 + 柠檬，口感不夸</p></div>
        <span class="arrow">→ 真的有用～</span>
        <div class="note b2"><span class="n">02</span><p>主食氀一半糙米与豆类，饱腹更久</p></div>
      </div></div>
      <span class="cap">正文</span>
    </div>
  </div>
</body>
