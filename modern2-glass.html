<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#0a0c0f; color:#e8e4dc; font-family:"Noto Sans SC",system-ui,sans-serif; }
  .top { padding:24px 30px; border-bottom:1px solid rgba(255,255,255,.08); }
  .top h1 { margin:0 0 6px; font-size:19px; }
  .top p { margin:0; font-size:13px; color:#8a96a6; line-height:1.6; max-width:800px; }
  .top a { color:#9ad7ff; }
  .deck { display:flex; flex-wrap:wrap; gap:36px; padding:36px 30px 60px; }
  .item { display:flex; flex-direction:column; gap:12px; }
  .frame { width:368px; height:490px; border-radius:14px; overflow:hidden; box-shadow:0 26px 60px rgba(0,0,0,.6); }
  .cap { font-size:12px; color:#8a96a6; }
  .card { width:1080px; height:1440px; transform:scale(.3407); transform-origin:top left; position:relative; overflow:hidden; font-family:"Noto Sans SC",system-ui,sans-serif; }
  .bgimg { position:absolute; inset:0; background-size:cover; background-position:center; }
  .tint { position:absolute; inset:0; background:linear-gradient(155deg, rgba(120,170,255,.45), rgba(255,180,220,.4) 55%, rgba(150,240,200,.45)); }
  .glass { position:absolute; backdrop-filter:blur(34px) saturate(1.5); -webkit-backdrop-filter:blur(34px) saturate(1.5); background:rgba(255,255,255,.26); border:1.5px solid rgba(255,255,255,.55); box-shadow:0 30px 70px rgba(20,40,90,.28), inset 0 2px 1px rgba(255,255,255,.7); }
  .g-main { left:74px; right:74px; top:150px; bottom:300px; border-radius:48px; padding:74px; display:flex; flex-direction:column; }
  .g-main .eyebrow { font-size:27px; letter-spacing:7px; color:#33415c; font-weight:700; }
  .g-main h1 { font-size:104px; font-weight:800; color:#172033; line-height:1.06; margin:auto 0 0; letter-spacing:-2px; }
  .g-main .sub { font-size:34px; color:#33415c; margin-top:22px; font-weight:500; }
  .g-chip { bottom:150px; left:120px; border-radius:100px; padding:26px 40px; font-size:32px; font-weight:700; color:#172033; }
  .g-chip2 { top:200px; right:120px; border-radius:32px; padding:30px 36px; text-align:center; }
  .g-chip2 b { font-size:64px; font-weight:800; color:#172033; display:block; line-height:1; }
  .g-chip2 span { font-size:24px; color:#33415c; }
  /* body */
  .b-bg { background:linear-gradient(160deg,#dbe7ff,#ffe2ef 55%,#dcffe9); }
  .b-wrap { position:absolute; inset:0; padding:80px 70px; display:flex; flex-direction:column; }
  .b-wrap .head { font-size:64px; font-weight:800; color:#172033; letter-spacing:-1px; margin:0 0 36px; }
  .g-row { border-radius:34px; padding:46px 48px; margin-bottom:26px; display:flex; align-items:center; gap:34px; }
  .g-row .num { font-size:64px; font-weight:800; color:#3b6fd6; flex:none; }
  .g-row p { font-size:38px; font-weight:600; color:#172033; line-height:1.4; margin:0; }
  .g-foot { margin-top:auto; font-size:30px; color:#33415c; font-weight:600; }
</style>
</head>
<body>
  <div class="top">
    <h1>2026 · 液态玻璃 / 空间感 Liquid Glass</h1>
    <p>Apple visionOS 26 的设计语言：半透明磨砂玻璃层、景深模糊、光泽与分层悬浮感。高级、平静、未来感，适合冥想/恢复/高端健康。（玻璃模糊需现代浏览器） · <a href="modern2.html">← 返回 2026 总览</a></p>
  </div>
  <div class="deck">
    <div class="item">
      <div class="frame"><div class="card">
        <div class="bgimg" style="background-image:url('https://images.pexels.com/photos/27850094/pexels-photo-27850094.jpeg?auto=compress&cs=tinysrgb&w=1200')"></div>
        <div class="tint"></div>
        <div class="glass g-chip2"><b>06</b><span>个仪式</span></div>
        <div class="glass g-main">
          <span class="eyebrow">MORNING RITUAL</span>
          <h1>改变人生的<br />6 个晨间仪式</h1>
          <span class="sub">早起党的温柔自救指南</span>
        </div>
        <div class="glass g-chip">轻盈·清澈·温柔</div>
      </div></div>
      <span class="cap">封面</span>
    </div>
    <div class="item">
      <div class="frame"><div class="card b-bg">
        <div class="b-wrap">
          <h2 class="head">三个温柔的开始</h2>
          <div class="glass g-row"><span class="num">01</span><p>含糖饮料换成气泡水 + 柠檬</p></div>
          <div class="glass g-row"><span class="num">02</span><p>主食氀一半糙米与豆类</p></div>
          <div class="glass g-row"><span class="num">03</span><p>嘴馔先喝水，等十分钟</p></div>
          <div class="g-foot">@津玉不良言</div>
        </div>
      </div></div>
      <span class="cap">正文</span>
    </div>
  </div>
</body>
</html>
