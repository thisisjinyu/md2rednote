<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>方案 A · 大字报 / Bold Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#0f0f10; color:#e8e4dc; font-family:"Noto Sans SC",system-ui,sans-serif; }
  .top { padding:24px 30px; border-bottom:1px solid rgba(255,255,255,.08); }
  .top h1 { margin:0 0 6px; font-size:19px; }
  .top p { margin:0; font-size:13px; color:#9a958c; line-height:1.6; max-width:780px; }
  .top a { color:#ff8a6e; }
  .deck { display:flex; flex-wrap:wrap; gap:36px; padding:36px 30px 60px; }
  .item { display:flex; flex-direction:column; gap:12px; }
  .frame { width:368px; height:490px; border-radius:10px; overflow:hidden; box-shadow:0 26px 60px rgba(0,0,0,.5); }
  .cap { font-size:12px; color:#9a958c; }
  .card { width:1080px; height:1440px; transform:scale(.3407); transform-origin:top left; position:relative; overflow:hidden; font-family:"Noto Sans SC",system-ui,sans-serif; }
  .a { --ink:#141210; --paper:#f4f1ea; --accent:#ff5a36; }
  .card.cover { background:var(--paper); color:var(--ink); display:flex; flex-direction:column; }
  .cover .media { height:44%; overflow:hidden; }
  .cover .media img { width:100%; height:100%; object-fit:cover; display:block; }
  .cover .cbody { flex:1; padding:70px 72px; display:flex; flex-direction:column; }
  .cover .tag { align-self:flex-start; font-size:24px; font-weight:700; letter-spacing:2px; background:var(--ink); color:var(--paper); padding:12px 24px; border-radius:100px; }
  .cover h1 { font-size:132px; line-height:.95; font-weight:900; letter-spacing:-3px; margin:34px 0 0; }
  .cover h1 .hl { background:var(--accent); color:#fff; padding:0 10px; }
  .cover .sub { margin-top:auto; font-size:36px; font-weight:500; color:#6a655e; }
  .card.body { background:var(--paper); color:var(--ink); padding:78px 72px; display:flex; flex-direction:column; }
  .body .kicker { font-size:27px; font-weight:900; color:var(--accent); letter-spacing:1px; }
  .body h2 { font-size:90px; font-weight:900; line-height:1.02; letter-spacing:-2px; margin:16px 0 46px; }
  .body ul { list-style:none; margin:0; padding:0; }
  .body li { display:flex; gap:30px; align-items:flex-start; margin-bottom:38px; }
  .body li .n { font-size:70px; font-weight:900; line-height:.9; color:var(--accent); flex:none; width:96px; }
  .body li .tx { font-size:40px; font-weight:600; line-height:1.38; padding-top:8px; }
  .body .pic { margin-top:auto; height:380px; border-radius:20px; overflow:hidden; }
  .body .pic img { width:100%; height:100%; object-fit:cover; display:block; }
</style>
</head>
<body>
  <div class="top">
    <h1>方案 A · 大字报 / Bold Editorial</h1>
    <p>超大特粗无衬线标题占满版心，紧排、负字距；关键词用实色块高亮；眉标做成圆角标签；去掉一切描边框。信息流里“吼得住”。 · <a href="modern.html">← 返回总览</a></p>
  </div>
  <div class="deck a">
    <div class="item">
      <div class="frame"><div class="card cover">
        <div class="media"><img src="https://images.pexels.com/photos/27850094/pexels-photo-27850094.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="" /></div>
        <div class="cbody">
          <span class="tag">MORNING RITUAL · 晨间仪式</span>
          <h1>改变人生的<span class="hl">6个</span>晨间仪式</h1>
          <span class="sub">早起党的温柔自救指南</span>
        </div>
      </div></div>
      <span class="cap">封面</span>
    </div>
    <div class="item">
      <div class="frame"><div class="card body">
        <span class="kicker">03 / 温柔的开始</span>
        <h2>三个不费力<br />的小改变</h2>
        <ul>
          <li><span class="n">01</span><span class="tx">含糖饮料换成气泡水 + 柠檬</span></li>
          <li><span class="n">02</span><span class="tx">主食氀一半糙米与豆类</span></li>
          <li><span class="n">03</span><span class="tx">嘴馔先喝水，等十分钟</span></li>
        </ul>
        <div class="pic"><img src="https://images.pexels.com/photos/6617496/pexels-photo-6617496.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="" /></div>
      </div></div>
      <span class="cap">正文</span>
    </div>
  </div>
</body>
</html>
