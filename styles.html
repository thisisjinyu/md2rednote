<!DOCTYPE html>
<html lang='zh-CN'>
<head>
<meta charset='UTF-8' />
<meta name='viewport' content='width=device-width, initial-scale=1.0' />
<title>md2rednote · 样式合集</title>
<link rel='preconnect' href='https://fonts.googleapis.com' />
<link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
<link href='https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,800;0,900;1,900&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@500;600;700;900&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Sora:wght@400;600;700;800&display=swap' rel='stylesheet' />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0b0c0f;color:#e8e4dc;font-family:'Noto Sans SC',system-ui,sans-serif;padding:42px 26px 100px;}
  .head{max-width:1180px;margin:0 auto 18px;}
  .head h1{font-size:30px;letter-spacing:.5px;}
  .head p{color:#9aa0aa;font-size:14px;line-height:1.7;margin-top:12px;max-width:880px;}
  .head a{color:#c6f24e;}
  .section{max-width:1340px;margin:0 auto;padding:42px 0 8px;border-top:1px solid rgba(255,255,255,.1);}
  .sh{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .sh h2{font-size:23px;}
  .sh .tag{font-size:11.5px;color:#0b0c0f;background:#c6f24e;padding:3px 11px;border-radius:100px;font-weight:700;letter-spacing:.5px;}
  .desc{color:#868d97;font-size:13px;line-height:1.6;max-width:820px;margin-bottom:24px;}
  .deck{display:flex;flex-wrap:wrap;gap:30px;}
  .item{display:flex;flex-direction:column;gap:10px;}
  .cap{font-size:12px;color:#aeb4bd;font-weight:600;}
  .frame{width:368px;height:490px;border-radius:12px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.5);}
  .card{width:1080px;height:1440px;transform:scale(.3407);transform-origin:top left;position:relative;overflow:hidden;}

  /* ===== 经典极简 cc ===== */
  .cc{--bg:#f3efe8;--ink:#2f2b25;--dim:#8f877a;--accent:#a86b4f;--rule:rgba(47,43,37,.16);background:var(--bg);color:var(--ink);font-family:'Noto Sans SC',system-ui,sans-serif;display:flex;flex-direction:column;}
  .cc .eyebrow{font-size:18px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--accent);}
  .cc h1{font-family:'Playfair Display','Noto Serif SC',Georgia,serif;letter-spacing:.5px;}
  .cc .sub{color:var(--dim);}
  .cc .media img{display:block;width:100%;height:100%;object-fit:cover;}
  .cc.va{padding:0;}
  .cc.va .media{width:100%;height:56%;flex:none;}
  .cc.va .media img{filter:saturate(.9) brightness(1.02);}
  .cc.va .panel{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 92px;}
  .cc.va .eyebrow{margin-bottom:24px;}
  .cc.va h1{font-size:94px;font-weight:700;line-height:1.1;margin-bottom:22px;}
  .cc.va h1 mark{background:linear-gradient(transparent 56%,color-mix(in srgb,var(--accent) 34%,transparent) 56%);color:inherit;padding:0 6px;}
  .cc.va .sub{font-size:30px;font-weight:300;}
  .cc.vb{padding:0;}
  .cc.vb .media{position:absolute;inset:0;}
  .cc.vb .media img{filter:brightness(.8) saturate(.86);}
  .cc.vb .scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,15,11,.76),rgba(20,15,11,.04) 56%);}
  .cc.vb .ov{position:relative;z-index:1;margin-top:auto;padding:0 88px 100px;}
  .cc.vb .eyebrow{color:rgba(255,255,255,.92);margin-bottom:22px;}
  .cc.vb h1{color:#fff;font-size:102px;font-weight:700;line-height:1.08;margin-bottom:24px;}
  .cc.vb h1 mark{background:transparent;color:#f0c4aa;}
  .cc.vb .sub{color:rgba(255,255,255,.9);font-size:31px;font-weight:300;}
  .cc.ve{flex-direction:row;padding:0;}
  .cc.ve .block{width:55%;flex:none;background:var(--accent);color:#fff;padding:104px 72px;display:flex;flex-direction:column;justify-content:center;}
  .cc.ve .block .eyebrow{color:rgba(255,255,255,.85);margin-bottom:28px;}
  .cc.ve .block h1{color:#fff;font-size:84px;font-weight:700;line-height:1.12;margin-bottom:24px;}
  .cc.ve .block .sub{color:rgba(255,255,255,.92);font-size:28px;font-weight:300;line-height:1.5;}
  .cc.ve .media{flex:1;}
  .cc.ve .media img{filter:saturate(.88) brightness(.98);}
  .cc.vc{flex-direction:row;padding:0;}
  .cc.vc .txt{flex:1;padding:110px 0 110px 92px;display:flex;flex-direction:column;justify-content:center;}
  .cc.vc .eyebrow{margin-bottom:14px;}
  .cc.vc .num{font-family:'Playfair Display','Noto Serif SC',serif;font-weight:700;font-size:320px;line-height:.84;color:var(--accent);}
  .cc.vc .lead{font-family:'Playfair Display','Noto Serif SC',serif;font-size:62px;font-weight:600;margin:8px 0 26px;line-height:1.15;}
  .cc.vc .sub{font-size:29px;font-weight:300;}
  .cc.vc .media{width:38%;flex:none;}
  .cc.vc .media img{filter:saturate(.88) brightness(1);}
  .cc.vd{padding:120px 96px;justify-content:center;}
  .cc.vd .eyebrow{margin-bottom:42px;}
  .cc.vd h1{font-size:106px;font-weight:700;line-height:1.14;}
  .cc.vd h1 mark{background:linear-gradient(transparent 54%,color-mix(in srgb,var(--accent) 40%,transparent) 54%);color:inherit;padding:0 8px;}
  .cc.vd .sub{margin-top:42px;font-size:32px;font-weight:300;}
  .cc.vf{flex-direction:row;padding:0;}
  .cc.vf .txt{flex:1;padding:104px 0 104px 96px;display:flex;flex-direction:column;}
  .cc.vf .txt .eyebrow{margin-bottom:60px;}
  .cc.vf .vtitle{writing-mode:vertical-rl;text-orientation:upright;font-family:'Playfair Display','Noto Serif SC',serif;font-weight:600;font-size:80px;letter-spacing:6px;line-height:1.6;align-self:flex-start;}
  .cc.vf .media{width:32%;flex:none;}
  .cc.vf .media img{filter:saturate(.85) brightness(.98);}
  .cc.vbody{padding:96px 90px;}
  .cc.vbody .eyebrow{margin-bottom:18px;}
  .cc.vbody h2{font-family:'Playfair Display','Noto Serif SC',serif;font-size:84px;font-weight:700;line-height:1.08;margin-bottom:48px;}
  .cc.vbody .row{display:flex;align-items:baseline;gap:30px;padding:28px 0;border-top:2px solid var(--rule);}
  .cc.vbody .row:last-of-type{border-bottom:2px solid var(--rule);}
  .cc.vbody .row .n{font-family:'Playfair Display',serif;font-size:64px;font-weight:700;color:var(--accent);width:96px;flex:none;}
  .cc.vbody .row .tx{font-size:38px;line-height:1.4;font-weight:400;}
  .cc.vbody .pic{margin-top:auto;height:340px;overflow:hidden;border-radius:4px;}
  .cc.vbody .pic img{width:100%;height:100%;object-fit:cover;}

  /* ===== 弥散渐变 gr ===== */
  .gr{color:#3a322c;font-family:'Noto Sans SC',system-ui,sans-serif;}
  .gr.cover{background:radial-gradient(120% 90% at 12% 8%,#ffd9c2 0,rgba(255,217,194,0) 55%),radial-gradient(120% 90% at 92% 18%,#ecd6f4 0,rgba(236,214,244,0) 55%),radial-gradient(130% 100% at 80% 100%,#cfe9da 0,rgba(207,233,218,0) 55%),#fbf5ee;padding:90px 80px;display:flex;flex-direction:column;}
  .gr.cover .eyebrow{font-size:26px;letter-spacing:7px;color:#b8795b;font-weight:600;}
  .gr.cover .photo{width:100%;height:520px;border-radius:40px;overflow:hidden;margin:44px 0 56px;box-shadow:0 34px 70px rgba(176,122,94,.28);}
  .gr.cover .photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .gr.cover h1{font-size:100px;font-weight:800;line-height:1.08;letter-spacing:-1px;margin:0;}
  .gr.cover h1 .hl{background:linear-gradient(transparent 56%,#ffc8a8 56%);}
  .gr.cover .sub{font-size:38px;color:#9a8c80;margin-top:28px;font-weight:500;}
  .gr.body{background:radial-gradient(100% 80% at 100% 0%,#f3e3f5 0,rgba(243,227,245,0) 52%),radial-gradient(90% 70% at 0% 100%,#d8ecdf 0,rgba(216,236,223,0) 50%),#fcf7f1;padding:90px 80px;display:flex;flex-direction:column;}
  .gr.body .pill{align-self:flex-start;font-size:24px;font-weight:600;color:#b8795b;background:#fff;border-radius:100px;padding:12px 26px;box-shadow:0 10px 24px rgba(176,122,94,.16);}
  .gr.body h2{font-size:72px;font-weight:800;line-height:1.12;margin:34px 0 36px;letter-spacing:-1px;}
  .gr.body .soft{background:rgba(255,255,255,.72);backdrop-filter:blur(6px);border-radius:32px;padding:52px 50px;box-shadow:0 20px 50px rgba(0,0,0,.06);}
  .gr.body .soft p{font-size:37px;line-height:1.72;color:#6b6058;margin:0 0 26px;}
  .gr.body .soft p:last-child{margin:0;}
  .gr.body .soft strong{color:#b8795b;font-weight:700;}
  .gr.body .pic{margin-top:auto;height:330px;border-radius:30px;overflow:hidden;box-shadow:0 24px 50px rgba(0,0,0,.1);}
  .gr.body .pic img{width:100%;height:100%;object-fit:cover;display:block;}

  /* ===== 杂志拼贴 co ===== */
  .co{color:#15130f;font-family:'Noto Sans SC',system-ui,sans-serif;}
  .co.cover{background:#efe9dd;}
  .co.cover .photo{position:absolute;top:96px;left:78px;width:600px;height:740px;border:9px solid #15130f;box-shadow:20px 20px 0 #15130f;transform:rotate(-3deg);overflow:hidden;}
  .co.cover .photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .co.cover .titlebox{position:absolute;right:54px;bottom:300px;background:#ffe14d;border:9px solid #15130f;padding:30px 38px;transform:rotate(2deg);box-shadow:16px 16px 0 #15130f;max-width:560px;}
  .co.cover .titlebox h1{font-size:96px;font-weight:900;line-height:.98;letter-spacing:-2px;margin:0;}
  .co.cover .titlebox .u{text-decoration:underline;text-decoration-thickness:10px;text-underline-offset:8px;}
  .co.cover .sticker{position:absolute;top:120px;right:90px;font-family:'Ma Shan Zheng',cursive;font-size:70px;color:#ff3b30;transform:rotate(8deg);}
  .co.cover .eyebrow{position:absolute;left:90px;bottom:150px;background:#15130f;color:#fff;font-size:26px;font-weight:700;letter-spacing:3px;padding:12px 24px;transform:rotate(-2deg);}
  .co.cover .sub{position:absolute;right:64px;bottom:200px;font-size:34px;font-weight:600;transform:rotate(2deg);}
  .co.body{background:#efe9dd;padding:72px 70px;}
  .co.body .hwtitle{font-family:'Ma Shan Zheng',cursive;font-size:96px;color:#15130f;margin:0 0 8px;transform:rotate(-1deg);}
  .co.body .rule{height:9px;background:#15130f;width:300px;margin-bottom:50px;}
  .co.body .note{background:#fff;border:7px solid #15130f;box-shadow:14px 14px 0 #15130f;padding:40px 44px;margin-bottom:46px;transform:rotate(-1deg);}
  .co.body .note .n{font-size:30px;font-weight:900;background:#ff3b30;color:#fff;padding:4px 16px;display:inline-block;margin-bottom:16px;}
  .co.body .note p{font-size:40px;font-weight:600;line-height:1.4;margin:0;}
  .co.body .note.b2{transform:rotate(1.5deg);background:#ffe14d;}
  .co.body .arrow{font-family:'Ma Shan Zheng',cursive;font-size:46px;color:#ff3b30;transform:rotate(-6deg);display:inline-block;margin:0 0 30px 40px;}

  /* ===== 生物数据 bi ===== */
  .bi{font-family:'Sora','Noto Sans SC',system-ui,sans-serif;--bg:#0c1117;--tile:#161d27;--line:rgba(255,255,255,.09);--txt:#eef2f6;--dim:#8a96a6;--g:#46e08a;--c:#4cc9f0;--o:#ff8a4c;--lime:#c6f24e;background:var(--bg);color:var(--txt);}
  .bi .bd-cover{padding:78px 70px;display:flex;flex-direction:column;height:100%;}
  .bi .lbl{font-size:24px;letter-spacing:5px;color:var(--lime);font-weight:700;}
  .bi .ringwrap{display:flex;justify-content:center;margin:30px 0 34px;}
  .bi .ring{width:430px;height:430px;border-radius:50%;background:conic-gradient(var(--lime) 76%,#1d2530 0);position:relative;display:grid;place-items:center;}
  .bi .ring::before{content:'';width:312px;height:312px;border-radius:50%;background:var(--bg);}
  .bi .ring .pct{position:absolute;inset:0;display:grid;place-items:center;text-align:center;}
  .bi .ring .pct b{font-size:128px;font-weight:800;line-height:1;letter-spacing:-3px;}
  .bi .ring .pct span{font-size:26px;color:var(--dim);display:block;margin-top:6px;}
  .bi .bd-cover h1{font-family:'Noto Sans SC';font-size:78px;font-weight:900;line-height:1.06;letter-spacing:-2px;margin:0;}
  .bi .bd-cover .sub{font-size:30px;color:var(--dim);margin-top:14px;}
  .bi .chips{display:flex;gap:16px;margin-top:auto;padding-top:40px;}
  .bi .chip{flex:1;background:var(--tile);border:1px solid var(--line);border-radius:24px;padding:28px;}
  .bi .chip .v{font-size:50px;font-weight:800;line-height:1;}
  .bi .chip .v.g{color:var(--g);}.bi .chip .v.c{color:var(--c);}.bi .chip .v.o{color:var(--o);}
  .bi .chip .k{font-size:23px;color:var(--dim);margin-top:10px;}
  .bi .bd-body{padding:62px;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-content:start;height:100%;}
  .bi .bd-body h2{grid-column:1/-1;font-family:'Noto Sans SC';font-size:58px;font-weight:900;margin:0 0 4px;letter-spacing:-1px;}
  .bi .tile{background:var(--tile);border:1px solid var(--line);border-radius:30px;padding:42px;}
  .bi .tile.full{grid-column:1/-1;}
  .bi .tile .tlabel{font-size:24px;color:var(--dim);font-weight:600;}
  .bi .tile .big{font-size:104px;font-weight:800;line-height:1;margin-top:14px;letter-spacing:-3px;}
  .bi .tile .big small{font-size:38px;color:var(--dim);font-weight:600;}
  .bi .tile .g{color:var(--g);}.bi .tile .lime{color:var(--lime);}.bi .tile .c{color:var(--c);}
  .bi .bars{display:flex;align-items:flex-end;gap:16px;height:210px;margin-top:26px;}
  .bi .bars i{flex:1;background:linear-gradient(180deg,var(--lime),var(--g));border-radius:10px 10px 4px 4px;display:block;}
  .bi .bars i.dim{background:#26303c;}
  .bi .legend{display:flex;justify-content:space-between;margin-top:14px;font-size:20px;color:var(--dim);}

  /* ===== 深林绿 gn ===== */
  .gn{font-family:'Noto Sans SC',system-ui,sans-serif;--green:#143a2c;--ivory:#f1ecdd;--lime:#c5e86b;}
  .gn.cover{background:var(--green);color:var(--ivory);display:flex;flex-direction:column;}
  .gn.cover .media{height:48%;overflow:hidden;position:relative;}
  .gn.cover .media img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(1.05);}
  .gn.cover .badge{position:absolute;top:40px;left:40px;background:var(--lime);color:var(--green);font-size:24px;font-weight:800;letter-spacing:1px;padding:12px 26px;border-radius:100px;}
  .gn.cover .cbody{flex:1;padding:64px 68px;display:flex;flex-direction:column;}
  .gn.cover .eyebrow{font-size:25px;letter-spacing:5px;font-weight:700;color:var(--lime);}
  .gn.cover h1{font-family:'Fraunces','Noto Sans SC',serif;font-size:118px;font-weight:600;line-height:1;letter-spacing:-2px;margin:26px 0 0;}
  .gn.cover h1 em{font-style:italic;color:var(--lime);}
  .gn.cover .sub{margin-top:auto;font-size:34px;color:#c7d3c0;font-weight:500;}
  .gn.body{background:var(--ivory);color:var(--green);padding:74px 70px;display:flex;flex-direction:column;}
  .gn.body .eyebrow{font-size:25px;letter-spacing:4px;font-weight:800;color:#5f7a3b;}
  .gn.body h2{font-family:'Fraunces','Noto Sans SC',serif;font-size:84px;font-weight:600;line-height:1.04;margin:14px 0 44px;letter-spacing:-1px;}
  .gn.body .row{display:flex;align-items:baseline;gap:28px;padding:30px 0;border-top:3px solid rgba(20,58,44,.18);}
  .gn.body .row:last-of-type{border-bottom:3px solid rgba(20,58,44,.18);}
  .gn.body .row .n{font-family:'Fraunces',serif;font-size:60px;font-weight:600;color:#5f7a3b;flex:none;width:96px;}
  .gn.body .row .tx{font-size:38px;font-weight:600;line-height:1.4;}
  .gn.body .tag{margin-top:auto;align-self:flex-start;background:var(--green);color:var(--lime);font-size:26px;font-weight:700;padding:14px 30px;border-radius:100px;}

  /* =====
