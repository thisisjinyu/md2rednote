<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />

<title>方案 B · 奶油弥散渐变</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#0f0f10; color:#e8e4dc; font-family:"Noto Sans SC",system-ui,sans-serif; }
  .top { padding:24px 30px; border-bottom:1px solid rgba(255,255,255,.08); }
  .top h1 { margin:0 0 6px; font-size:19px; }
  .top p { margin:0; font-size:13px; color:#9a958c; line-height:1.6; max-width:780px; }
  .top a { color:#ff8a6e; }
  .deck { display:flex; flex-wrap:wrap; gap:36px; padding:36px 30px 60px; }
  .item { display:flex; flex-direction:column; gap:12px; }
  .frame { width:368px; height:490px; border-radius:10px; overflow:hidden; box-shadow:0 26px 60px rgba(0,0,0,.5); }
  .cap { font-size:12px; color:#9a958c; }
  .card { width:1080px; height:1440px; transform:scale(.3407); transform-origin:top left; position:relative; overflow:hidden; font-family:"Noto Sans SC",system-ui,sans-serif; color:#3a322c; }
  .card.cover { background: radial-gradient(120% 90% at 12% 8%, #ffd9c2 0%, rgba(255,217,194,0) 55%), radial-gradient(120% 90% at 92% 18%, #ecd6f4 0%, rgba(236,214,244,0) 55%), radial-gradient(130% 100% at 80% 100%, #cfe9da 0%, rgba(207,233,218,0) 55%), #fbf5ee; padding:90px 80px; display:flex; flex-direction:column; }
  .cover .eyebrow { font-size:26px; letter-spacing:7px; color:#b8795b; font-weight:600; }
  .cover .photo { width:100%; height:520px; border-radius:40px; overflow:hidden; margin:44px 0 56px; box-shadow:0 34px 70px rgba(176,122,94,.28); }
  .cover .photo img { width:100%; height:100%; object-fit:cover; display:block; }
  .cover h1 { font-size:100px; font-weight:800; line-height:1.08; letter-spacing:-1px; margin:0; }
  .cover h1 .hl { background:linear-gradient(transparent 56%, #ffc8a8 56%); }
  .cover .sub { font-size:38px; color:#9a8c80; margin-top:28px; font-weight:500; }
  .card.body { background: radial-gradient(100% 80% at 100% 0%, #f3e3f5 0, rgba(243,227,245,0) 52%), radial-gradient(90% 70% at 0% 100%, #d8ecdf 0, rgba(216,236,223,0) 50%), #fcf7f1; padding:90px 80px; display:flex; flex-direction:column; }
  .body .pill { align-self:flex-start; font-size:24px; font-weight:600; color:#b8795b; background:#fff; border-radius:100px; padding:12px 26px; box-shadow:0 10px 24px rgba(176,122,94,.16); }
  .body h2 { font-size:72px; font-weight:800; line-height:1.12; margin:34px 0 36px; letter-spacing:-1px; }
  .body .soft { background:rgba(255,255,255,.72); backdrop-filter:blur(6px); border-radius:32px; padding:52px 50px; box-shadow:0 20px 50px rgba(0,0,0,.06); }
  .body .soft p { font-size:37px; line-height:1.72; color:#6b6058; margin:0 0 26px; font-weight:400; }
  .body .soft p:last-child { margin:0; }
  .body .soft strong { color:#b8795b; font-weight:700; }
  .body .pic { margin-top:auto; height:330px; border-radius:30px; overflow:hidden; box-shadow:0 24px 50px rgba(0,0,0,.1); }
  .body .pic img { width:100%; height:100%; object-fit:cover; display:block; }
</style>

<body>
  <div class="top">
    <h1>方案 B · 奶油弥散渐变 / Soft Mesh</h1>
    <p>多层弥散渐变背景（橙、藕、薄荷柔光）+ 大圆角图片 + 半透明毛玻璃卡。治愈、柔和、当下最火的“奶油风”，适合生活方式/情绪类内容。 · <a href="modern.html">← 返回总览</a></p>
  </div>
  <div class="deck">
    <div class="item">
      <div class="frame"><div class="card cover">
        <span class="eyebrow">MORNING RITUAL</span>
        <div class="photo"><img src="https://images.pexels.com/photos/27850094/pexels-photo-27850094.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="" /></div>
        <h1>改变人生的<span class="hl">6个</span><br />晨间仪式</h1>
        <span class="sub">早起党的温柔自救指南</span>
      </div></div>
      <span class="cap">封面</span>
    </div>
    <div class="item">
      <div class="frame"><div class="card body">
        <span class="pill">温柔的开始</span>
        <h2>三个不费力的小改变</h2>
        <div class="soft">
          <p><strong>一、</strong>含糖饮料换成气泡水加一片柠檬，口感不夸。</p>
          <p><strong>二、</strong>主食氀一半糙米与豆类，饱腹感更久。</p>
          <p><strong>三、</strong>嘴馔时先喝水，等十分钟再决定。</p>
        </div>
        <div class="pic"><img src="https://images.pexels.com/photos/6617496/pexels-photo-6617496.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="" /></div>
      </div></div>
      <span class="cap">正文</span>
    </div>
  </div>
</body>
</html>
