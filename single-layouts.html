<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单图版式画廊 · md2rednote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@500;600;700;900&family=Playfair+Display:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
 --hero:url("https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1200&q=80");
 --sage:#8a9a5b;--sage-deep:#5f6b45;--sage-soft:#e7ecd9;
 --cream:#f3efe6;--paper:#fbfaf7;--ink:#2c2e27;--muted:#7c8070;--line:#e3e0d6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',sans-serif;background:#eceae3;color:var(--ink);padding:56px 40px 110px}
.page-hd{text-align:center;max-width:1100px;margin:0 auto 56px}
.page-hd h1{font:900 46px/1.2 'Noto Serif SC';letter-spacing:.02em}
.page-hd p{margin-top:14px;color:var(--muted);font-size:18px;letter-spacing:.04em}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:52px 36px;max-width:1520px;margin:0 auto}
.cell figcaption{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:15px;font-weight:600;color:#41443a}
.cell figcaption .num{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;font-size:13px;font-weight:700}
.cell figcaption small{font-weight:400;color:var(--muted)}
.stage{--s:.315;width:calc(1080px*var(--s));height:calc(1440px*var(--s));overflow:hidden;border-radius:14px;box-shadow:0 14px 34px rgba(40,40,30,.16);background:#fff}
.card{width:1080px;height:1440px;transform:scale(var(--s));transform-origin:top left;position:relative;overflow:hidden;background:var(--paper)}
.eyebrow{font:600 26px/1 'Noto Sans SC';letter-spacing:.42em;text-transform:uppercase;color:var(--sage-deep)}
.h-title{font:800 96px/1.16 'Noto Serif SC';color:var(--ink)}
.h-sub{font:400 36px/1.5 'Noto Sans SC';color:var(--muted)}
.feat-list{display:flex;flex-direction:column;gap:34px}
.feat{display:flex;align-items:center;gap:26px}
.feat .ic{flex:0 0 auto;width:74px;height:74px;border-radius:50%;display:grid;place-items:center;background:var(--sage-soft);color:var(--sage-deep)}
.feat .ic svg{width:38px;height:38px}
.feat b{display:block;font:600 36px/1.1 'Noto Sans SC';color:var(--ink)}
.feat span{display:block;font:400 27px/1.2 'Noto Sans SC';color:var(--muted);margin-top:6px}

/* 01 上下结构 */
.lay-tb{display:flex;flex-direction:column}
.lay-tb .top{flex:0 0 62%;background:var(--sage);padding:100px 84px 0;display:flex;flex-direction:column;gap:32px}
.lay-tb .eyebrow{color:#e9efd6}.lay-tb .h-title{color:#fff}.lay-tb .h-sub{color:#eef2e2}
.lay-tb .feat .ic{background:rgba(255,255,255,.18);color:#fff}.lay-tb .feat b{color:#fff}.lay-tb .feat span{color:#e2e8d2}
.lay-tb .pic{flex:1;background:var(--hero) center/cover}

/* 02 左右分栏 */
.lay-lr{display:flex}
.lay-lr .left{flex:0 0 54%;padding:0 74px;display:flex;flex-direction:column;justify-content:center;gap:36px;background:var(--paper)}
.lay-lr .right{flex:1;background:var(--hero) center/cover}

/* 03 全图叠字 */
.lay-full{background:var(--hero) center/cover;display:flex;flex-direction:column;justify-content:space-between;padding:100px 84px}
.lay-full::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,22,16,.62),rgba(20,22,16,.12) 45%,rgba(20,22,16,.72));z-index:0}
.lay-full>*{position:relative;z-index:1}
.lay-full .eyebrow{color:#e7ecd9}.lay-full .h-title{color:#fff}.lay-full .h-sub{color:#eef1e6}
.lay-full .top-grp{display:flex;flex-direction:column;gap:28px}
.lay-full .feat-list{flex-direction:row;gap:34px}
.lay-full .feat{flex-direction:column;align-items:center;text-align:center;gap:14px;flex:1}
.lay-full .feat .ic{background:rgba(255,255,255,.2);color:#fff}.lay-full .feat b{color:#fff}.lay-full .feat span{color:#dfe4d4}

/* 04 图框留白 */
.lay-frame{background:var(--cream);padding:80px;display:flex;flex-direction:column;gap:46px}
.lay-frame .frame{flex:0 0 54%;border-radius:20px;background:var(--hero) center/cover;box-shadow:0 18px 40px rgba(0,0,0,.16)}
.lay-frame .txt{display:flex;flex-direction:column;gap:24px}
.lay-frame .feat-list{flex-direction:row;gap:30px;margin-top:4px}
.lay-frame .feat{flex-direction:column;align-items:center;text-align:center;gap:12px;flex:1}

/* 05 侧边色带 */
.lay-side{position:relative;background:var(--hero) center/cover}
.lay-side .band{position:absolute;top:0;bottom:0;left:0;width:47%;background:rgba(95,107,69,.94);padding:0 62px;display:flex;flex-direction:column;justify-content:center;gap:32px}
.lay-side .eyebrow{color:#dde6c5}.lay-side .h-title{color:#fff;font-size:84px}.lay-side .h-sub{color:#eef2e2}
.lay-side .feat .ic{background:rgba(255,255,255,.18);color:#fff}.lay-side .feat b{color:#fff}.lay-side .feat span{color:#e2e8d2}

/* 06 圆形裁切 */
.lay-circle{background:var(--cream);padding:90px 80px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:38px}
.lay-circle .circ{width:600px;height:600px;border-radius:50%;background:var(--hero) center/cover;box-shadow:0 20px 44px rgba(0,0,0,.18);border:14px solid #fff}
.lay-circle .feat-list{flex-direction:row;gap:36px;margin-top:6px}
.lay-circle .feat{flex-direction:column;align-items:center;text-align:center;gap:12px}

/* 07 半圆拱顶 */
.lay-arch{display:flex;flex-direction:column;background:var(--paper)}
.lay-arch .dome{flex:0 0 60%;background:var(--hero) center/cover;border-bottom-left-radius:50% 26%;border-bottom-right-radius:50% 26%}
.lay-arch .txt{flex:1;padding:54px 84px;display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center;gap:28px}
.lay-arch .feat-list{flex-direction:row;gap:34px}
.lay-arch .feat{flex-direction:column;align-items:center;text-align:center;gap:12px}

/* 08 斜切构图 */
.lay-diag{position:relative;background:var(--sage-deep)}
.lay-diag .pic{position:absolute;top:0;left:0;right:0;height:64%;background:var(--hero) center/cover;clip-path:polygon(0 0,100% 0,100% 78%,0 100%)}
.lay-diag .content{position:absolute;left:0;right:0;bottom:0;height:44%;padding:0 84px 86px;display:flex;flex-direction:column;justify-content:flex-end;gap:26px}
.lay-diag .eyebrow{color:#dde6c5}.lay-diag .h-title{color:#fff}.lay-diag .h-sub{color:#eef2e2}
.lay-diag .feat-list{flex-direction:row;gap:34px}
.lay-diag .feat{flex-direction:column;align-items:center;text-align:center;gap:12px}
.lay-diag .feat .ic{background:rgba(255,255,255,.18);color:#fff}.lay-diag .feat b{color:#fff}.lay-diag .feat span{color:#e2e8d2}

/* 09 卡片叠层 */
.lay-stack{background:var(--cream);display:grid;place-items:center}
.lay-stack .wrap{position:relative;width:720px;height:1060px}
.lay-stack .wrap::before,.lay-stack .wrap::after{content:"";position:absolute;inset:0;border-radius:26px}
.lay-stack .wrap::before{transform:rotate(-6deg) translateY(10px);background:var(--sage-soft);box-shadow:0 14px 30px rgba(0,0,0,.12)}
.lay-stack .wrap::after{transform:rotate(4deg);background:#fff;box-shadow:0 14px 30px rgba(0,0,0,.1)}
.lay-stack .face{position:relative;z-index:2;width:100%;height:100%;border-radius:26px;overflow:hidden;background:#fff;box-shadow:0 22px 48px rgba(0,0,0,.2);display:flex;flex-direction:column}
.lay-stack .face .pic{flex:0 0 56%;background:var(--hero) center/cover}
.lay-stack .face .txt{flex:1;padding:46px 54px;display:flex;flex-direction:column;justify-content:center;gap:20px}
.lay-stack .face .h-title{font-size:68px}

/* 10 渐变大字 */
.lay-grad{background:linear-gradient(155deg,#f1f3e9 0%,#dde6c8 60%,#cdd9b2 100%);padding:100px 84px;display:flex;flex-direction:column;gap:40px}
.lay-grad .h-title{font-size:104px}
.lay-grad .feat-list{flex-direction:row;gap:30px}
.lay-grad .feat{flex-direction:column;align-items:center;text-align:center;gap:12px;flex:1}
.lay-grad .pic{flex:1;border-radius:22px;background:var(--hero) center/cover;box-shadow:0 16px 36px rgba(0,0,0,.16)}

/* 11 纵向流程 */
.lay-steps{background:var(--paper);padding:88px 84px;display:flex;flex-direction:column;gap:36px}
.lay-steps .pic{flex:0 0 32%;border-radius:18px;background:var(--hero) center/cover}
.lay-steps .steps{display:flex;flex-direction:column;gap:28px}
.lay-steps .step{display:flex;gap:26px;align-items:center}
.lay-steps .step .no{flex:0 0 auto;width:84px;font:800 48px/1 'Noto Serif SC';color:var(--sage)}
.lay-steps .step b{display:block;font:600 38px/1.1 'Noto Sans SC';color:var(--ink)}
.lay-steps .step span{display:block;font:400 27px/1.2 'Noto Sans SC';color:var(--muted);margin-top:6px}

/* 12 杂志风 */
.lay-mag{background:#fff;padding:80px;display:flex;flex-direction:column}
.lay-mag .mast{font:900 150px/.9 'Playfair Display';letter-spacing:.02em;color:var(--ink);border-bottom:4px solid var(--ink);padding-bottom:22px}
.lay-mag .kicker{display:flex;justify-content:space-between;font:600 24px 'Noto Sans SC';letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin:24px 0 50px}
.lay-mag .body{display:flex;gap:46px;flex:1}
.lay-mag .col-l{flex:0 0 46%;display:flex;flex-direction:column;justify-content:center;gap:26px}
.lay-mag .col-l .h-title{font-size:76px}
.lay-mag .col-r{flex:1;background:var(--hero) center/cover;border-radius:8px}

/* 13 暗色摄影 */
.lay-dark{background:#1c1e18;display:flex;flex-direction:column}
.lay-dark .pic{flex:0 0 52%;background:var(--hero) center/cover}
.lay-dark .txt{flex:1;padding:76px 84px;display:flex;flex-direction:column;justify-content:center;gap:28px}
.lay-dark .eyebrow{color:#c9d3a8}.lay-dark .h-title{color:#fff}.lay-dark .h-sub{color:#cfcdc2}
.lay-dark .feat-list{flex-direction:row;gap:34px}
.lay-dark .feat{flex-direction:column;align-items:center;text-align:center;gap:12px;flex:1}
.lay-dark .feat .ic{background:rgba(255,255,255,.12);color:#dfe6c8}.lay-dark .feat b{color:#fff}.lay-dark .feat span{color:#b9b8ad}

/* 14 弧形遮罩 */
.lay-arc{position:relative;background:var(--hero) center/cover;overflow:hidden}
.lay-arc .sweep{position:absolute;left:-12%;right:-12%;bottom:-6%;height:58%;background:rgba(95,107,69,.95);border-radius:50% 50% 0 0/34% 34% 0 0}
.lay-arc .content{position:absolute;left:0;right:0;bottom:0;height:52%;padding:0 84px 84px;display:flex;flex-direction:column;justify-content:flex-end;gap:24px;z-index:2}
.lay-arc .eyebrow{color:#dde6c5}.lay-arc .h-title{color:#fff}.lay-arc .h-sub{color:#eef2e2}
.lay-arc .feat-list{flex-direction:row;gap:34px}
.lay-arc .feat{flex-direction:column;align-items:center;text-align:center;gap:12px}
.lay-arc .feat .ic{background:rgba(255,255,255,.18);color:#fff}.lay-arc .feat b{color:#fff}.lay-arc .feat span{color:#e2e8d2}

/* 15 数据环 */
.lay-ring{background:var(--paper);padding:88px 80px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:44px}
.lay-ring .donut{position:relative;width:560px;height:560px;border-radius:50%;background:conic-gradient(var(--sage) 0 60deg,var(--sage-deep) 60deg 120deg,#a9b87f 120deg 180deg,var(--sage) 180deg 240deg,var(--sage-deep) 240deg 300deg,#a9b87f 300deg 360deg)}
.lay-ring .donut::before{content:"";position:absolute;inset:70px;border-radius:50%;background:var(--hero) center/cover;box-shadow:inset 0 0 0 12px #fff,0 8px 22px rgba(0,0,0,.18)}
.lay-ring .legend{display:flex;gap:40px}
.lay-ring .legend .feat{flex-direction:column;align-items:center;text-align:center;gap:10px}

/* 16 有机画框 */
.lay-blob{position:relative;background:var(--paper)}
.lay-blob .blob-accent{position:absolute;left:-70px;bottom:-70px;width:360px;height:360px;border-radius:42% 58% 50% 50%/55% 45% 55% 45%;background:var(--sage-soft);z-index:0}
.lay-blob .deco-leaf{position:absolute;left:40px;bottom:48px;width:130px;height:130px;color:#c4d0a4;opacity:.7;transform:rotate(-12deg);z-index:0}
.lay-blob .pic{position:absolute;inset:0;background:var(--hero) center/cover;clip-path:path("M560 0 L1080 0 L1080 1440 L470 1440 C510 1200 400 1040 510 880 C600 740 430 600 540 430 C600 250 510 160 560 0 Z");z-index:1}
.lay-blob .badge{position:absolute;top:66px;left:70px;width:98px;height:74px;border-radius:50%;background:var(--sage-deep);color:#fff;display:grid;place-items:center;font:800 42px/1 'Noto Serif SC';z-index:3}
.lay-blob .txt{position:absolute;left:70px;top:176px;width:380px;display:flex;flex-direction:column;gap:28px;z-index:2}
.lay-blob .h-title{color:var(--sage-deep);font-size:86px}
.lay-blob .h-sub{color:var(--muted)}
.lay-blob .feat-list{gap:30px;margin-top:14px}
.lay-blob .feat b{font-size:32px}.lay-blob .feat span{font-size:25px}
.lay-blob .brand{position:absolute;left:72px;bottom:84px;font:italic 600 32px/1.3 'Playfair Display';color:var(--sage-deep);z-index:2}
</style>
</head>
