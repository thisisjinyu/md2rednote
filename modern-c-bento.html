<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>方案 C · 极简 Bento 卡片</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#0f0f10; color:#e8e4dc; font-family:"Noto Sans SC",system-ui,sans-serif; }
  .top { padding:24px 30px; border-bottom:1px solid rgba(255,255,255,.08); }
  .top h1 { margin:0 0 6px; font-size:19px; }
  .top p { margin:0; font-size:13px; color:#9a958c; line-height:1.6; max-width:780px; }
  .top a { color:#ff8a6e; }
  .deck { display:flex; flex-wrap:wrap; gap:36px; padding:36px 30px 60px; }
  .item { display:flex; flex-direction:column; gap:12px; }
  .frame { width:368px; height:490px; border-radius:10px; overflow:hidden; box-shadow:0 26px 60px rgba(0,0,0,.5); }
  .cap { font-size:12px; color:#9a958c; }
  .card { width:1080px; height:1440px; transform:scale(.3407); transform-origin:top left; position:relative; overflow:hidden; font-family:"Noto Sans SC",system-ui,sans-serif; color:#1c1d22; }
  .card.cover, .card.body { background:#eef0f2; padding:52px; display:grid; gap:26px; }
  .card.cover { grid-template-columns:1fr 1fr; grid-template-rows:auto 1.1fr auto; }
  .blk { background:#fff; border-radius:36px; padding:46px; box-shadow:0 12px 34px rgba(20,22,40,.06); display:flex; flex-direction:column; }
  .blk.title { grid-column:1 / -1; }
  .blk.title .tagrow { display:flex; gap:14px; margin-bottom:24px; }
  .blk.title .t { font-size:23px; font-weight:600; color:#5b6b53; background:#eaf0e6; border-radius:100px; padding:9px 22px; }
  .blk.title h1 { font-size:84px; font-weight:900; line-height:1.06; letter-spacing:-2px; margin:0; }
  .blk.img { padding:0; overflow:hidden; }
  .blk.img img { width:100%; height:100%; object-fit:cover; display:block; }
  .blk.accent { background:#5b6b53; color:#fff; justify-content:center; }
  .blk.accent .big { font-size:128px; font-weight:900; line-height:.9; letter-spacing:-3px; }
  .blk.accent .lbl { font-size:30px; font-weight:500; opacity:.85; margin-top:10px; }
  .blk.foot { grid-column:1 / -1; flex-direction:row; align-items:center; justify-content:space-between; padding:40px 46px; }
  .blk.foot .sub { font-size:34px; font-weight:500; color:#6b6d76; }
  .blk.foot .brand { font-size:28px; font-weight:700; color:#5b6b53; }
  .card.body { grid-template-columns:1fr 1fr; grid-template-rows:auto auto 1fr; }
  .blk.head { grid-column:1 / -1; }
  .blk.head h2 { font-size:66px; font-weight:900; letter-spacing:-1px; margin:0; }
  .blk .step { font-size:30px; font-weight:700; color:#5b6b53; }
  .blk .stx { font-size:35px; font-weight:500; line-height:1.4; margin-top:14px; color:#2a2b30; }
  .blk.tall { grid-row: span 1; justify-content:center; }
  .blk.imgwide { grid-column:1 / -1; padding:0; overflow:hidden; }
  .blk.imgwide img { width:100%; height:100%; object-fit:cover; display:block; }
</style>
</head>
<body>
  <div class="top">
    <h1>方案 C · 极简 Bento 卡片</h1>
    <p>信息拆成圆角“便当格”块，柔阴影、模块化、大留白但有结构；单一冷静色（鼠尾草绿）点缀。科技感、整齐、信息密度高。 · <a href="modern.html">← 返回总览</a></p>
  </div>
  <div class="deck">
    <div class="item">
      <div class="frame"><div class="card cover">
        <div class="blk title">
          <div class="tagrow"><span class="t"># 晨间仪式</span><span class="t"># 减糖</span></div>
          <h1>改变人生的 6 个晨间仪式</h1>
        </div>
        <div class="blk img"><img src="https://images.pexels.com/photos/27850094/pexels-photo-27850094.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="" /></div>
        <div class="blk accent"><span class="big">06</span><span class="lbl">个温柔习惯</span></div>
        <div class="blk foot"><span class="sub">早起党的温柔自救指南</span><span class="brand">@津玉不良言</span></div>
      </div></div>
      <span class="cap">封面</span>
    </div>
    <div class="item">
      <div class="frame"><div class="card body">
        <div class="blk head"><h2>三个不费力的小改变</h2></div>
        <div class="blk tall"><span class="step">01</span><span class="stx">含糖饮料换成气泡水 + 柠檬</span></div>
        <div class="blk tall"><span class="step">02</span><span class="stx">主食氀一半糙米与豆类</span></div>
        <div class="blk imgwide"><img src="https://images.pexels.com/photos/6617496/pexels-photo-6617496.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="" /></div>
      </div></div>
      <span class="cap">正文</span>
    </div>
  </div>
</body>
</html>
